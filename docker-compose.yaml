# Docker-first deployment: the app image plus Postgres.
# Two durable volumes: `content` (canonical repo — back up off-site via git remotes)
# and `pgdata` (control plane — normal Postgres backups). `cache` is rebuildable.
services:
  incant:
    build: .
    ports: ["8080:8080"]
    depends_on: [db]
    volumes:
      - content:/var/lib/incant/repo               # canonical repo — DURABLE
      - cache:/var/lib/incant/cache                # caches + spills — rebuildable
    environment:
      INCANT_REPO_PATH: /var/lib/incant/repo
      INCANT_DATABASE_URL: postgresql+psycopg://incant:incant@db/incant
      INCANT_MODE: full                            # full | serve (read-only, no mgmt/UI)
      INCANT_BOOTSTRAP_ADMIN_KEY: ${INCANT_BOOTSTRAP_ADMIN_KEY:-incant_sk_dev_admin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 12
  db:
    image: postgres:17
    volumes: [pgdata:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: incant
      POSTGRES_USER: incant
      POSTGRES_PASSWORD: incant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incant"]
      interval: 5s
      timeout: 3s
      retries: 12
volumes:
  content:
  cache:
  pgdata:
