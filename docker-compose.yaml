# Docker-first deployment: the app image plus Postgres.
# Two durable volumes: `content` (canonical repo — back up off-site via git remotes)
# and `pgdata` (control plane — normal Postgres backups). `cache` is rebuildable.
services:
  incant:
    build: .
    ports: ["8080:8080"]
    depends_on: [db]
    volumes:
      - content:/var/lib/incant/repo               # canonical repo — DURABLE
      - cache:/var/lib/incant/cache                # caches + spills — rebuildable
    environment:
      INCANT_REPO_PATH: /var/lib/incant/repo
      INCANT_DATABASE_URL: postgresql+psycopg://incant:incant@db/incant
      INCANT_MODE: full                            # full | serve (read-only, no mgmt/UI)
      # Bootstrap admin credential. Leave unset: on first boot Incant generates a
      # strong random admin key and prints it once (watch `docker compose logs incant`).
      # Set INCANT_BOOTSTRAP_ADMIN_KEY to pin your own key instead.
      # INCANT_BOOTSTRAP_ADMIN_KEY: incant_sk_your_own_key
      # INCANT_ALLOW_DEV_KEY: "1"                   # dev/test only: allow incant_sk_dev_admin
      # Security (see README "Security"). TLS terminates at your proxy:
      # INCANT_ENFORCE_TLS: "1"                     # emit HSTS (only behind a TLS proxy)
      # INCANT_KEY_PEPPER: change-me-to-a-secret    # peppered v2$ key hashing (keep stable)
      # INCANT_METRICS_TOKEN: change-me             # let a principal-less Prometheus read /metrics
      # INCANT_AUTH_TTL: "5.0"                       # key-cache TTL ⇒ cross-replica revocation bound
      # INCANT_AUTH_THROTTLE_LIMIT: "20"            # failed bearer auths/IP/window before 429 (0=off)
      # INCANT_AUTH_THROTTLE_WINDOW: "60"           # throttle window (seconds)
      # INCANT_TRUSTED_PROXIES: "10.0.0.1,10.0.0.2" # proxy IPs whose X-Forwarded-For is trusted (empty=never)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 12
  db:
    image: postgres:17
    ports: ["5432:5432"]                           # host access for tests/psql
    volumes: [pgdata:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: incant
      POSTGRES_USER: incant
      POSTGRES_PASSWORD: incant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incant"]
      interval: 5s
      timeout: 3s
      retries: 12
volumes:
  content:
  cache:
  pgdata:
