# Alembic configuration for Incant's Postgres control plane.
#
# The database URL is NOT set here — env.py reads it from incant's Settings
# (INCANT_DATABASE_URL). At boot / `incant init` the URL is also injected
# programmatically (see incant.db._alembic_config).
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
